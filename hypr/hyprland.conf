source=~/.config/hypr/conf/monitors.conf
source=~/.config/hypr/conf/workspaces.conf # file is ignored by git, must create locally
source=~/.config/hypr/conf/keybinds.conf
source=~/.config/hypr/conf/windowRules.conf
#source=~/.config/hypr/conf/plugins.conf

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum

exec-once=dbus-update-activation-environment --systemd --all
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME QT_STYLE_OVERRIDE
exec-once=hyprpaper
exec-once=$HOME/.config/hypr/scripts/launchers/ags.sh
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once=$HOME/.config/hypr/scripts/cursor/setCursor.sh
exec-once=$HOME/.config/hypr/scripts/launchers/firefoxHomePageServer.sh &> /dev/null &
exec-once=$HOME/.config/hypr/scripts/socket/acpid_listener.sh &> /dev/null &
exec-once=hypridle
exec-once=hyprctl dispatch workspace 11
exec-once=hyprctl dispatch workspace 1
exec-once=play $HOME/.config/hypr/assets/sounds/desktop-login.oga &> /dev/null &

input {
    kb_layout = us
    numlock_by_default = false
    float_switch_override_focus = 0
    follow_mouse = 2

    touchpad {
        scroll_factor = 0.2
        drag_lock = true
        tap-and-drag = true
    }
}

# use "hyprctl devices" to find device names
device {
    name = logitech-usb-receiver
    sensitivity = -0.3
}

device {
    name = e-signal-usb-gaming-mouse
    sensitivity = -0.8
}

gestures {
    workspace_swipe = true
    workspace_swipe_invert = false
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(D0EBEEFF)
    col.inactive_border = rgba(52677CFF)
    layout = dwindle
}

cursor {
    no_warps = true
}

group {
    col.border_active = rgba(D0EBEEFF)
    col.border_inactive = rgba(52677CFF)
    col.border_locked_active = rgba(D0EBEEFF)
    col.border_locked_inactive = rgba(52677CFF)

    groupbar {
        font_family = JetBrainsMonoNerdFontMono
        font_size = 11
        col.active = rgba(52677CFF)
        col.inactive = rgba(0C0E11FF)
        col.locked_active = rgba(52677CFF)
        col.locked_inactive = rgba(0C0E11FF)
        text_color = rgba(D0EBEEFF)
    }
}

decoration {
    rounding = 8
    active_opacity = 1
    inactive_opacity = 1
    drop_shadow = no
    shadow_range = 15
    shadow_render_power = 2
    col.shadow = rgba(D0EBEE99)
    col.shadow_inactive = rgba(52677C00)
    blur {
        enabled = true
        size = 10
        passes = 3
        new_optimizations = true
        xray = false
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1
    bezier = workspaceBez, 0.61, 1, 0.88, 1

    animation = windows, 1, 7, myBezier
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 3, workspaceBez, slidevert
}

misc {
    disable_hyprland_logo = true
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

xwayland {
    force_zero_scaling = true
}
